name: Build and Release

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string

  # Trigger on version tags
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Tunnelflare
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Get version from tag or input
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          # Refuse anything that is not strict SemVer (MAJOR.MINOR.PATCH)
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::'$VERSION' is not a valid SemVer version (expected MAJOR.MINOR.PATCH, tag vX.Y.Z)"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Stamp version into build settings
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Config/Base.xcconfig is the single source of truth for the version.
          sed -i '' "s/^MARKETING_VERSION = .*/MARKETING_VERSION = $VERSION/" Config/Base.xcconfig
          sed -i '' "s/^CURRENT_PROJECT_VERSION = .*/CURRENT_PROJECT_VERSION = ${{ github.run_number }}/" Config/Base.xcconfig
          grep -E '^(MARKETING_VERSION|CURRENT_PROJECT_VERSION)' Config/Base.xcconfig

      - name: Resolve Swift package dependencies
        run: xcodebuild -project Tunnelflare.xcodeproj -resolvePackageDependencies

      - name: Build release
        run: |
          chmod +x scripts/build-release.sh
          ./scripts/build-release.sh

      - name: Verify built version matches tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILT_VERSION=$(defaults read "$PWD/build/Tunnelflare.app/Contents/Info" CFBundleShortVersionString)
          if [ "$BUILT_VERSION" != "$VERSION" ]; then
            echo "::error::Built app version '$BUILT_VERSION' does not match tag version '$VERSION'"
            exit 1
          fi
          echo "Built version $BUILT_VERSION matches tag"

      - name: Get release artifact name
        id: artifact
        run: |
          ARTIFACT=$(ls build/*.zip | head -1)
          echo "path=$ARTIFACT" >> $GITHUB_OUTPUT
          echo "name=$(basename $ARTIFACT)" >> $GITHUB_OUTPUT

      # Signs the release zip with the Sparkle EdDSA private key and produces
      # appcast.xml. The private key lives ONLY in the SPARKLE_PRIVATE_KEY
      # repository secret — see docs/RELEASING.md for setup.
      - name: Generate Sparkle appcast
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "::warning::SPARKLE_PRIVATE_KEY secret not set — skipping appcast generation (release will not be offered as an in-app update)"
            exit 0
          fi
          VERSION="${{ steps.version.outputs.version }}"
          SPARKLE_VERSION="2.6.4"
          curl -sSL -o /tmp/sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p /tmp/sparkle-tools
          tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle-tools
          # Keep only the release zip in the scan directory
          mkdir -p appcast-work
          cp "${{ steps.artifact.outputs.path }}" appcast-work/
          echo "$SPARKLE_PRIVATE_KEY" | /tmp/sparkle-tools/bin/generate_appcast \
            --ed-key-file - \
            --link "https://github.com/${{ github.repository }}/releases" \
            --download-url-prefix "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/" \
            -o appcast.xml \
            appcast-work
          cat appcast.xml

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tunnelflare-${{ steps.version.outputs.version }}
          path: build/*.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ steps.artifact.outputs.path }}
            appcast.xml
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
